<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found - Luxury.cars</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
</head>
<body>
    <header class="header">
        <div class="header_container">
            <nav class="header_nav">
                <a class="header_logo" href="index.html">Luxury.cars</a>
                <ul class="header_nav-list">
                    <li class="header__nav-item">
                        <a class="header__nav-link" href="index.html">Home</a>
                    </li>
                    <li class="header__nav-item">
                        <a class="header__nav-link" href="catalog.html">Catalog</a>
                    </li>
                    <li class="header__nav-item">
                        <a class="header__nav-link" href="service.html">Service</a>
                    </li>
                    <li class="header__nav-item">
                        <a class="header__nav-link" href="test-drive.html">Test Drive</a>
                    </li>
                    <li class="header__nav-item">
                        <a class="header__nav-link" href="contacts.html">Contacts</a>
                    </li>
                </ul>
                <button class="profile_button" id="openloginButton" onclick="openModal()"><img src="img/customer.svg" alt="profile-icon"></button>
            </nav>
        </div>
    </header>

<main>
    <section class="error-page">
        <div class="error-page_container">
            <h1 class="error-page__code">404</h1>
            <h2 class="error-page__title">Page Not Found</h2>
            <p class="error-page__text">The page you are looking for doesn't exist or has been moved.</p>
            <a href="index.html" class="error-page__link">Back to Home</a>
        </div>
    </section>
</main>

<div class="login_modal" id="login_modal">
    <div class="login__container" id="login__container">
        <div class="login_header">
            <h2>Sign In</h2>
            <button id="closeloginButton" class="login__close-button"><img src="img/close-icon.svg" alt="Close"></button>
        </div>
        <div class="login_form">
            <form class="login__form">
                <input type="email" placeholder="Email" class="login__input">
                <input type="password" placeholder="Password" class="login__input">
                <button type="submit" class="login__button">Sign In</button>
                <p class="register_link">Don't have an account? <a href="javascript:void(0)" id="register_link">Sign Up</a></p>
            </form>
        </div>
    </div>
    <div class="register__container" id="register__container">
        <div class="register_header">
            <h2>Sign Up</h2>
            <button id="closeregisterButton" class="register__close-button"><img src="img/close-icon.svg" alt="Close"></button>
        </div>
        <div class="register_form">
            <form class="register__form">
                <input type="text" placeholder="Name" class="register__input">
                <input type="email" placeholder="Email" class="register__input">
                <input type="password" placeholder="Password" class="register__input">
                <button type="submit" class="register__button" onclick="closeRegisterModal()">Create Account</button>
                <p class="login_link">Already have an account? <a id="login__link" href="javascript:void(0)">Sign In</a></p>
            </form>
        </div>
    </div>
</div>
<script src="js/app.js"></script>
</body>
</html>
